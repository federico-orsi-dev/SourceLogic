name: CI-Quality-Gate

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop, main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend # Mantenuto perché il tuo codice è in /backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Dependencies
        # --frozen è perfetto per la CI: evita modifiche inaspettate al lockfile
        run: uv sync --frozen --all-groups

      - name: Lint & Format (Ruff)
        run: |
          uv run ruff check . --output-format=github
          uv run ruff format --check .

      - name: Static Typing (Mypy)
        run: uv run mypy . --ignore-missing-imports

      - name: Security Scan (Bandit)
        # FIX CRITICO: Escludiamo .venv per evitare il freeze di 6 minuti
        run: uv run bandit -r . -x .venv,tests -ll

      - name: Test with Coverage
        env:
          OPENAI_API_KEY: ci-test-key
          DATABASE_URL: sqlite+aiosqlite:///./data/ci.db
        run: |
          uv run pytest -q --maxfail=1 --cov=. --cov-report=term-missing --cov-fail-under=40