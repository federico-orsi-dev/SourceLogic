name: CI-Quality-Gate

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Dependencies
        run: uv sync --frozen --all-groups

      - name: Lint & Format (Ruff)
        run: |
          uv run ruff check . --output-format=github
          uv run ruff format --check .

      - name: Static Typing (Mypy)
        run: uv run mypy

      - name: Security Scan (Bandit)
        run: uv run bandit -r app -l

      - name: Verify Alembic migrations
        env:
          OPENAI_API_KEY: ci-test-key
          DATABASE_URL: sqlite+aiosqlite:///./data/alembic_ci.db
        run: |
          uv run alembic upgrade head
          uv run alembic check

      - name: Test with Coverage
        env:
          OPENAI_API_KEY: ci-test-key
          DATABASE_URL: sqlite+aiosqlite:///./data/ci.db
        run: |
          uv run pytest -q --maxfail=1 --cov --cov-report=term-missing --cov-fail-under=70

  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
