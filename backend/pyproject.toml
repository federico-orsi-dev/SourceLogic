[project]
name = "sourcelogic-saas-backend"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.100",
    "uvicorn",
    "langchain>=0.3.0",
    "langchain-chroma",
    "langchain-openai",
    "langchain-huggingface",
    "langchain-core",
    "chromadb>=1.5.5",
    "sentence-transformers",
    "tiktoken",
    "pydantic-settings",
    "python-dotenv",
    "sqlalchemy>=2.0.0",
    "aiosqlite",
    "alembic>=1.18.4",
    "slowapi>=0.1.9",
    "python-jose[cryptography]>=3.3.0",
]

[dependency-groups]
dev = [
    "ruff",
    "mypy",
    "bandit",
    "pytest",
    "pytest-cov",
    "pytest-asyncio",
    "httpx",
    "ipykernel",
]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["app", "tests"]
# Alembic migrations are auto-generated — exclude from lint/format enforcement.
exclude = ["alembic/"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "C4", "UP", "ARG"]
ignore = [
    "B008",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.12"
files = ["app", "tests"]
strict = true
ignore_missing_imports = true
explicit_package_bases = true
pretty = true
show_error_codes = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"
addopts = "-q"

[tool.coverage.run]
source = ["app"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]
